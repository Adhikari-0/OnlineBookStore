<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Panel</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f4f7fc;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-box input {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
        }

        .btn-search {
            background: #4CAF50;
        }

        .btn-back {
            background: #555;
        }

        .btn-delete {
            background: red;
        }

        .btn-edit {
            background: #2196F3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .pagination a {
            margin: 5px;
            padding: 8px 12px;
            background: #ddd;
            text-decoration: none;
            border-radius: 5px;
            color: black;
        }

        .pagination a.active {
            background: #4CAF50;
            color: white;
        }
    </style>
</head>

<body>

    <!-- 🔝 Header -->
    <header>
        Admin Management Panel
    </header>

    <div class="container">

        <!-- 🔙 Top Bar -->
        <div class="top-bar">

            <!-- Go Back -->
            <button class="btn-back" th:onclick="|window.location.href='@{/SuperAdmin}'|">⬅ Go Back</button>

            <!-- 🔍 Search -->
            <form method="get" th:action="@{/SuperAdmin/admins}" class="search-box">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Search admin...">
                <button type="submit" class="btn-search">Search</button>
            </form>

        </div>

        <!-- 📊 Table -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="admin : ${admins}">
                    <td th:text="${admin.id}"></td>
                    <td th:text="${admin.fullName}"></td>
                    <td th:text="${admin.email}"></td>

                    <td>
                        <!-- Edit (optional) -->
                        <a th:href="@{'/SuperAdmin/edit/' + ${admin.id}}">
                            <button class="btn-edit">Edit</button>
                        </a>

                        <!-- Delete -->
                        <a th:href="@{'/SuperAdmin/delete/' + ${admin.id}}" onclick="return confirm('Are you sure?')">
                            <button class="btn-delete">Delete</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- 📄 Pagination -->
        <div class="pagination">
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:href="@{/SuperAdmin/admins(page=${i}, keyword=${keyword})}" th:text="${i + 1}"
                th:classappend="${i == currentPage} ? 'active'">
            </a>
        </div>

    </div>

</body>

</html>
