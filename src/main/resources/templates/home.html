<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Online Book Store</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			background: #f5f5f5;
		}

		header {
			background: #4CAF50;
			color: white;
			padding: 10px;
			text-align: center;
		}

		.top-nav {
			display: flex;
			justify-content: space-between;
			padding: 10px 20px;
			background: white;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
		}

		.logo {
			cursor: pointer;
			font-weight: bold;
		}

		.search input {
			padding: 6px;
			width: 200px;
		}

		.section {
			padding: 20px;
		}

		.book-list {
			display: flex;
			flex-wrap: wrap;
			gap: 15px;
			justify-content: center;
		}

		.book {
			background: white;
			border-radius: 10px;
			width: 170px;
			padding: 10px;
			text-align: center;
			box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
			transition: 0.2s;
		}

		.book:hover {
			transform: translateY(-5px);
		}

		.book img {
			width: 100%;
			height: 200px;
			border-radius: 6px;
		}

		button {
			margin-top: 5px;
			padding: 5px 8px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}

		.view {
			background: #2196F3;
			color: white;
		}

		.download {
			background: #ff9800;
			color: white;
		}

		.wishlist {
			background: #e91e63;
			color: white;
		}

		.toast {
			position: fixed;
			bottom: 20px;
			right: 20px;
			background: #4CAF50;
			color: white;
			padding: 10px;
			border-radius: 5px;
			display: none;
		}
	</style>
</head>

<body>

	<header style="display:flex; justify-content:space-between; align-items:center; padding:10px 20px;">

		<h2 style="margin:0;">📘 Online Book Store</h2>

		<form th:action="@{/auth/logout}" method="post" style="margin:0;">
			<button type="submit" style="
            background:#f44336;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:5px;
            cursor:pointer;">
				🚪 Logout
			</button>
		</form>

	</header>

	<div class="top-nav">
		<div>
			<span class="logo" onclick="location.href='/book'">🏠 Home</span>
			|
			<span class="logo" onclick="location.href='/wishlist'">❤️ Wishlist</span>
		</div>

		<div class="search">
			<input type="text" id="bookSearch" placeholder="Search..." onkeyup="fetchSuggestions()">
		</div>
	</div>

	<div id="toast" class="toast"></div>

	<section class="section">
		<h3>📚 Books</h3>

		<div class="book-list">
			<div class="book" th:each="b : ${book}">

				<img th:if="${b.imageData}" th:src="'data:image/jpeg;base64,' + ${b.imageData}" />

				<strong th:text="${b.name}"></strong>
				<div th:text="${b.author}"></div>
				<div>₹<span th:text="${b.price}"></span></div>

				<div th:if="${b.pdfData}">
					<button class="view" th:attr="onclick=|viewPdf('${b.pdfData}')|">View</button>
					<button class="download" th:attr="onclick=|downloadPdf('${b.pdfData}','${b.pdfFileName}')|">
						Download
					</button>
				</div>

				<button class="wishlist" th:attr="onclick=|addToWishlist(${b.id}, this)|">
					❤️ Wishlist
				</button>

			</div>
		</div>
	</section>

	<script>
		function viewPdf(base64) {
			window.open("data:application/pdf;base64," + base64);
		}

		function downloadPdf(base64, name) {
			const a = document.createElement("a");
			a.href = "data:application/pdf;base64," + base64;
			a.download = name || "book.pdf";
			a.click();
		}

		function addToWishlist(id, btn) {
			fetch(`/wishlist/add/${id}`)
				.then(res => res.json())
				.then(d => {
					showToast(d.message);
					btn.innerText = "✅ Added";
					btn.disabled = true;
				});
		}

		function showToast(msg) {
			const t = document.getElementById("toast");
			t.innerText = msg;
			t.style.display = "block";
			setTimeout(() => t.style.display = "none", 2000);
		}

		function fetchSuggestions() {
			const q = document.getElementById('bookSearch').value;
			if (q.length < 2) return;
			window.location.href = `/book/search?name=${q}`;
		}
	</script>

</body>

</html>
