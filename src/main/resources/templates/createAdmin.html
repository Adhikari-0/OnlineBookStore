<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logout button */
        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .logout button {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout button:hover {
            background: #d32f2f;
        }

        /* Glass login box */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 35px 30px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 5px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .input-group input:focus {
            box-shadow: 0 0 5px #fff;
        }

        /* Button */
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #ff9800;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #e68900;
        }
    </style>
</head>

<body>

    <!-- ✅ Logout Button -->
    <div class="logout">
        <form action="/auth/logout" method="post">
            <button type="submit">🚪 Logout</button>
        </form>
    </div>

    <div class="login-box">
        <h2>👨‍💼 Create Admin</h2>
        <!-- ✅ Success Message -->
        <p style="color:green" th:text="${success}"></p>

        <!-- ❌ Error Message -->
        <p style="color:red" th:text="${error}"></p>

        <form action="/create/admin" method="post">

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="fullName" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">➕ Create Admin</button>
        </form>
    </div>

</body>

</html>
