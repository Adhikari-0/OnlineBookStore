<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            min-height: 100vh;
        }

        /* 🔹 Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .nav-left button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.3s;
        }

        .nav-left button:hover {
            background: #1976D2;
        }

        .nav-right button {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .nav-right button:hover {
            background: #d32f2f;
        }

        /* 🔹 Center container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

        /* 🔹 Glass card */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 35px 30px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        /* 🔹 Inputs */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 5px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .input-group input:focus {
            box-shadow: 0 0 5px #fff;
        }

        /* 🔹 Button */
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #ff9800;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #e68900;
        }

        /* 🔹 Messages */
        .success {
            color: #00ffae;
            margin-bottom: 10px;
        }

        .error {
            color: #ff4d4d;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <!-- ✅ Navbar -->
    <div class="navbar">

        <div class="nav-left">
            <a href="/SuperAdmin/admins">
                <button>📋 Admin List</button>
            </a>
        </div>

        <div class="nav-right">
            <form action="/auth/logout" method="post">
                <button type="submit">🚪 Logout</button>
            </form>
        </div>

    </div>

    <!-- ✅ Center Form -->
    <div class="container">
        <div class="login-box">

            <h2>👨‍💼 Create Admin</h2>

            <!-- Success -->
            <p class="success" th:text="${success}"></p>

            <!-- Error -->
            <p class="error" th:text="${error}"></p>

            <form action="/create/admin" method="post">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" placeholder="Enter name" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit">➕ Create Admin</button>

            </form>

        </div>
    </div>

</body>

</html>
