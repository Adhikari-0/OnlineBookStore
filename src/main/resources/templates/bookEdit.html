<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Add New Book</title>
	<style>
		body {
			font-family: 'Arial', sans-serif;
			background: #f4f4f4;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		h2 {
			color: #4CAF50;
			text-align: center;
			margin-bottom: 20px;
		}

		.form-container {
			background: white;
			padding: 30px 40px;
			border-radius: 10px;
			box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			max-width: 100%;
		}

		.form-container h2 {
			text-align: center;
			margin-bottom: 20px;
			color: #333;
		}



		/*----------------------------*/
		.inside-form {
			display: flex;
			justify-content: space-between;
			gap: 30px;
		}

		.text-container,
		.media-container,
		.image-container {
			flex: 1;
		}

		.image-container {
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			justify-content: space-between;
			gap: 10px;
		}

		.image-frame {
			width: 300px;
			height: 200px;
			border: 2px solid #333;
			overflow: hidden;
			border-radius: 8px;
		}

		/*--------------------------------------------------*/

		label {
			display: block;
			margin-top: 15px;
			margin-bottom: 5px;
			color: #555;
		}

		input[type="text"],
		input[type="number"],
		.select-container {
			width: 100%;
			padding: 10px;
			margin-right: 200px;
			border: 1px solid #ccc;
			border-radius: 6px;
			box-sizing: border-box;
		}

		.media-frame {
			display: block;
			margin-bottom: 5px;
			margin-left: 40px;
		}

		.preview-pdf-buttons {
			display: flex;
			gap: 10px;
		}

		.preview-pdf-buttons button {
			padding: 10px 20px;
			background-color: #4CAF50;
			border: none;
			color: white;
			border-radius: 4px;
			cursor: pointer;
		}

		.image-frame img {
			width: 100%;
			height: auto;
			display: block;
		}

		.button-group {
			display: flex;
			justify-content: center;
			gap: 15px;
			margin-top: 20px;
		}

		.action-button {
			padding: 6px 14px;
			font-size: 14px;
			background-color: #4CAF50;
			border: none;
			color: white;
			border-radius: 4px;
			cursor: pointer;
			text-decoration: none;
		}

		.back-link {
			background-color: #888;
		}

		.action-button:hover {
			opacity: 0.9;
		}
	</style>
</head>

<body>

	<h2>Edit Book</h2>
	<div class="form-container">
		<form th:action="@{'/admin/update/' + ${book.id}}" method="post" enctype="multipart/form-data">
			<div class="inside-form">
				<div class="text-container">
					<label for="name">Book Name:</label>
					<input type="text" id="name" name="name" th:value="${book.name}" required>

					<label for="author">Author:</label>
					<input type="text" id="author" name="author" th:value="${book.author}" required>

					<label for="price">Price (₹):</label>
					<input type="number" id="price" name="price" step="0.01" th:value="${book.price}" required>

					<label for="country">Book Category</label>
					<select name="category" id="country" class="select-container">
						<option value="Fiction" th:selected="${book.category == 'Fiction'}">Fiction</option>
						<option value="Non-fiction" th:selected="${book.category == 'Non-fiction'}">Non-fiction</option>
						<option value="Science" th:selected="${book.category == 'Science'}">Science</option>
						<option value="Technology" th:selected="${book.category == 'Technology'}">Technology</option>
						<option value="Children" th:selected="${book.category == 'Children'}">Children</option>

					</select>
				</div>
				<div class="media-container">
					<!-- Current PDF Preview -->
					<label>Current PDF:<span th:text="${book.pdfFileName}"></span></label>
					<div class="preview-pdf-buttons">
						<button type="button" th:attr="onclick=|viewPdf('${book.pdfData}')|">View</button>
						<button type="button"
							th:attr="onclick=|downloadPdf('${book.pdfData}', '${book.pdfFileName}')|">Download</button>
					</div>
					<label for="bookFile">Upload Book File in PDF</label>
					<input type="file" id="bookFile" name="pdfFile" accept=".pdf" />

					<label for="bookImage">Upload cover image</label>
					<input type="file" name="imageFile" id="imageInput" />
				</div>
				<div class="image-container">
					<p>Current Image: <span th:text="${book.imageFileName}"></span></p>
					<div class="image-frame">
						<img th:src="'data:image/jpeg;base64,' + ${book.imageData}" width="200" alt="No Image" />
					</div>
					<div class="image-frame">
						<img id="preview" alt="No Image" />
						<script>
							const input = document.getElementById('imageInput');
							const preview = document.getElementById('preview');

							input.addEventListener('change', function () {
								const file = input.files[0];
								if (file) {
									preview.src = URL.createObjectURL(file);
								}
							});
						</script>
					</div>
				</div>
			</div>
			<div class="button-group">
				<button type="submit" class="action-button">Add Book</button>
				<a th:href="@{/admin}" class="action-button back-link">← Back to Book List</a>
			</div>
		</form>
	</div>
	<script>
		function viewPdf(base64) {
			const win = window.open();
			win.document.write('<iframe src="data:application/pdf;base64,' + base64 +
				'" style="width:100%; height:100%;" frameborder="0"></iframe>');
		}

		function downloadPdf(base64, fileName) {
			const link = document.createElement('a');
			link.href = "data:application/pdf;base64," + base64;
			link.download = fileName || "book.pdf";
			link.click();
		}
	</script>

</body>

</html>
