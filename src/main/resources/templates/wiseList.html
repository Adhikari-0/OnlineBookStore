<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Online Book Store</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		header,
		footer {
			background-color: #4CAF50;
			color: white;
			padding: 0.5rem;
			text-align: center;
		}

		.logo-list {
			display: flex;
			flex-direction: row;
			gap: 20px;
		}

		.logo {
			padding: 0.5rem 1rem;
			background: #eee;
			text-decoration: none;
			cursor: pointer;
		}

		.top-nav-container {
			position: sticky;
			top: 0;
			background-color: #f4f4f4;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0.75rem 1rem;
			z-index: 1000;
		}

		.section {
			padding: 0.5rem;
		}

		.book-list {
			display: flex;
			flex-direction: row;
			gap: 20px;
			flex-wrap: wrap;
		}

		.book {
			border: 1px solid #ccc;
			padding: 10px;
			width: 150px;
			text-align: center;
		}

		.image-frame-home img {
			width: 150px;
			height: 200px;
		}

		.category-list {
			display: flex;
			gap: 1rem;
			margin-bottom: 1rem;
		}

		.category {
			background: #eee;
			padding: 0.5rem 1rem;
			border-radius: 5px;
			cursor: pointer;
		}
	</style>
</head>

<body>
	<header>
		<h1>📘 Online Book Store</h1>
	</header>
	<!--     -->
	<div class="top-nav-container">
		<div class="logo-list">
			<div class="logo" th:attr="onclick=|location.href='@{/book}'|" style="cursor: pointer;">
				BookStore
			</div>
		</div>
	</div>
	<section class="section">
		<h2>🌟 Wise List Books</h2>
		<div class="book-list">
			<div class="book" th:each="b : ${book}">
				<div th:if="${b.imageData}" class="image-frame-home">
					<img th:src="'data:image/jpeg;base64,' + ${b.imageData}" width="200" />
				</div>

				<div class="pdf-frame-home" th:if="${b.pdfData}">
					<button type="button" th:attr="onclick=|viewPdf('${b.pdfData}')|">View</button>
					<button type="button"
						th:attr="onclick=|downloadPdf('${b.pdfData}', '${b.pdfFileName}')|">Download</button>
					<button type="button" th:attr="onclick=|viewPdf('${b.pdfData}')|">Remove</button>
				</div>

				<strong th:text="${b.name}">Book Name</strong>
				<div>Author: <span th:text="${b.author}"></span></div>
				<strong th:text="${b.category}">Category</strong>
				<div>₹<span th:text="${b.price}"></span></div>
			</div>
		</div>
	</section>


	<section class="section">
		<h2>🔥 Best Sellers</h2>
		<div class="book-list">
			<!-- Similar structure to above -->
		</div>
	</section>
	<footer>
		<p>&copy; 2025 Online Book Store. All rights reserved.</p>
	</footer>
</body>
<script>
	function viewPdf(base64) {
		const dataUrl = "data:application/pdf;base64," + base64;
		const win = window.open();
		win.document.write(
			`<iframe src="${dataUrl}" style="width:100%; height:100%;" frameborder="0"></iframe>`
		);
	}

	function downloadPdf(base64, fileName) {
		const dataUrl = "data:application/pdf;base64," + base64;
		const link = document.createElement("a");
		link.href = dataUrl;
		link.download = fileName || "book.pdf";
		link.click();
	}
</script>


</html>
