<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist - Online Book Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
        }

        header, footer {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .top-nav-container {
            position: sticky;
            top: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            z-index: 1000;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .section {
            padding: 20px;
        }

        .book-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .book {
            background: white;
            border-radius: 10px;
            padding: 15px;
            width: 180px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .book:hover {
            transform: scale(1.05);
        }

        .image-frame-home img {
            width: 150px;
            height: 200px;
            border-radius: 5px;
        }

        .pdf-frame-home button {
            margin: 5px 3px;
            padding: 5px 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2196F3;
            color: white;
        }

        .pdf-frame-home button:hover {
            background-color: #0b7dda;
        }

        .remove-btn {
            margin-top: 10px;
            padding: 6px 10px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background-color: #cc0000;
        }

        .empty-msg {
            font-size: 18px;
            color: #777;
        }
    </style>
</head>

<body>

<header>
    <h1>📘 Online Book Store</h1>
</header>

<div class="top-nav-container">
    <div class="logo" th:onclick="|window.location.href='@{/book}'|">
        🏠 BookStore
    </div>
</div>

<section class="section">
    <h2>🌟 Your Wishlist</h2>

    <!-- If empty -->
    <div th:if="${#lists.isEmpty(wishlist)}" class="empty-msg">
        No books in wishlist 😢
    </div>

    <!-- Wishlist items -->
    <div class="book-list">
        <div class="book" th:each="w : ${wishlist}">

            <!-- Image -->
            <div th:if="${w.imageData}" class="image-frame-home">
                <img th:src="'data:image/jpeg;base64,' + ${w.imageData}" />
            </div>

            <!-- PDF -->
            <div class="pdf-frame-home" th:if="${w.pdfData}">
                <button type="button"
                        th:attr="onclick=|viewPdf('${w.pdfData}')|">
                    📖 View
                </button>

                <button type="button"
                        th:attr="onclick=|downloadPdf('${w.pdfData}', '${w.pdfFileName}')|">
                    ⬇ Download
                </button>
            </div>

            <!-- Details -->
            <strong th:text="${w.name}">Book Name</strong>
            <div>Author: <span th:text="${w.author}"></span></div>
            <div><b th:text="${w.category}">Category</b></div>
            <div>₹<span th:text="${w.price}"></span></div>

            <!-- Remove -->
            <form th:action="@{/wishlist/remove}" method="post">
                <input type="hidden" name="id" th:value="${w.id}" />
                <button type="submit" class="remove-btn">❌ Remove</button>
            </form>

        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 Online Book Store. All rights reserved.</p>
</footer>

<script>
    function viewPdf(base64) {
        const dataUrl = "data:application/pdf;base64," + base64;
        const win = window.open();
        win.document.write(
            `<iframe src="${dataUrl}" style="width:100%; height:100%;" frameborder="0"></iframe>`
        );
    }

    function downloadPdf(base64, fileName) {
        const dataUrl = "data:application/pdf;base64," + base64;
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = fileName || "book.pdf";
        link.click();
    }
</script>

</body>
</html>
